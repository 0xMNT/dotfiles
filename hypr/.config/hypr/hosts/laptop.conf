# Laptop-specific configuration

################
### MONITORS ###
################

# External monitor (top):  3840x2160 @ scale 2  → logical 1920×1080, origin 0,0
# Laptop screen (bottom):  1920x1080 @ scale 1.25 → logical 1536×864
#   centered under external: x = (1920 - 1536) / 2 = 192
monitor = HDMI-A-1, 3840x2160@60, 0x0, 2
monitor = eDP-1, 1920x1080@60, 192x1080, 1.25
# Fallback: any other connected output gets auto-detected
monitor = , preferred, auto, 1

######################
### WORKSPACE PINS ###
######################

# External monitor (top) — workspaces 1–6
# 1=firefox  2=ghostty  3=docs  4=spotify  5=chromium  6=misc
workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:HDMI-A-1

# Laptop screen (bottom) — workspaces 7–10
# 7=terminals  8=logs  9=chat  10=monitoring
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1

#############
### INPUT ###
#############

input {
    kb_layout = de
    kb_variant =
    kb_model =
    kb_options = caps:escape
    kb_rules =
    follow_mouse = 1
    sensitivity = -0.22

    touchpad {
        natural_scroll = true
        scroll_factor = 0.3
    }
}

device {
    name = elan900c:00-04f3:2830
    transform = 0
}

device {
    name = logitech-usb-optical-mouse
    sensitivity = -0.8
}

###################
### KEYBINDINGS ###
###################

# Toggle screen rotation
bind = , F9, exec, ~/.config/hypr/toggle-rotation.sh

# Laptop LCD brightness
bindel = ,XF86MonBrightnessUp,   exec, ~/.local/bin/swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, ~/.local/bin/swayosd-client --brightness lower

# Focus other monitor: ALT + , / .
bind = $mainMod, comma,  focusmonitor, l
bind = $mainMod, period, focusmonitor, r

# Move active window to other monitor: ALT + SHIFT + , / .
bind = $mainMod SHIFT, comma,  movewindow, mon:l
bind = $mainMod SHIFT, period, movewindow, mon:r

# Move window to a workspace on the external monitor (1–6) silently
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6

# Move window to a workspace on the laptop screen (7–10) silently
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

##################################
### STARTUP (laptop-specific)  ###
##################################

# Custom swayosd with rotation fix
exec-once = ~/.local/bin/swayosd-server -s ~/.config/swayosd/style.css &

exec-once = hypridle
exec-once = kanshi
exec-once = ~/.config/hypr/force-normal-orientation.sh
exec-once = ~/.config/hypr/pin-workspaces.sh

# Chromium on misc workspace
exec-once = [workspace 5 silent] chromium --restore-last-session

############################
### WINDOW RULES LAPTOP  ###
############################

# Chromium is laptop-only, not in common.conf
windowrule = workspace 5 silent, match:class ^(chromium)$
