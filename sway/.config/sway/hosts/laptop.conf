# Laptop-specific configuration

################
### MONITORS ###
################

# External monitor (top): 3840x2160 @ scale 2 → logical 1920×1080
# Laptop screen (bottom): 1920x1080 @ scale 1.25 → logical 1536×864, centered
output HDMI-A-1 resolution 3840x2160 position 0 0 scale 2
output eDP-1 resolution 1920x1080 position 192 1080 scale 1.25

######################
### WORKSPACE PINS ###
######################

# External monitor (top) — workspaces 1–6
workspace 1 output HDMI-A-1
workspace 2 output HDMI-A-1
workspace 3 output HDMI-A-1
workspace 4 output HDMI-A-1
workspace 5 output HDMI-A-1
workspace 6 output HDMI-A-1

# Laptop screen (bottom) — workspaces 7–10
workspace 7 output eDP-1
workspace 8 output eDP-1
workspace 9 output eDP-1
workspace 10 output eDP-1

#############
### INPUT ###
#############

# General pointer sensitivity (matches hyprland input.sensitivity)
input "type:pointer" {
    pointer_accel -0.22
}

input "type:touchpad" {
    natural_scroll enabled
    scroll_factor 0.3
}

# Logitech USB mouse (matches hyprland device.sensitivity)
input "1133:4122:Logitech_USB_Optical_Mouse" {
    pointer_accel -0.8
}

###################
### KEYBINDINGS ###
###################

# Laptop LCD brightness
bindsym XF86MonBrightnessUp exec swayosd-client --brightness raise
bindsym XF86MonBrightnessDown exec swayosd-client --brightness lower

# Focus other monitor: ALT + , / .
bindsym $mainMod+comma focus output left
bindsym $mainMod+period focus output right

# Move active window to other monitor: ALT + SHIFT + , / .
bindsym $mainMod+Shift+comma move container to output left
bindsym $mainMod+Shift+period move container to output right

# Move window to workspace on external monitor (1–6) silently
bindsym $mainMod+Ctrl+1 move container to workspace 1
bindsym $mainMod+Ctrl+2 move container to workspace 2
bindsym $mainMod+Ctrl+3 move container to workspace 3
bindsym $mainMod+Ctrl+4 move container to workspace 4
bindsym $mainMod+Ctrl+5 move container to workspace 5
bindsym $mainMod+Ctrl+6 move container to workspace 6

# Move window to workspace on laptop screen (7–10) silently
bindsym $mainMod+Ctrl+7 move container to workspace 7
bindsym $mainMod+Ctrl+8 move container to workspace 8
bindsym $mainMod+Ctrl+9 move container to workspace 9
bindsym $mainMod+Ctrl+0 move container to workspace 10

##################################
### STARTUP (laptop-specific)  ###
##################################

exec_always sh -c "pkill -x swayosd-server; /usr/bin/swayosd-server -s ~/.config/swayosd/style.css"
exec swayidle
exec kanshi

# Chromium on misc workspace
assign [app_id="chromium"] workspace 5
exec chromium --restore-last-session
