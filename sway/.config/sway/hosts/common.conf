###################
### MY PROGRAMS ###
###################

set $terminal ghostty
set $fileManager dolphin
set $menu pkill wofi || wofi --show drun
set $mainMod Mod1

#################
### AUTOSTART ###
#################

# Propagate environment to dbus and systemd — REQUIRED for bindsym exec and apps to work
exec dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=sway PATH
exec systemctl --user import-environment DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP PATH

exec_always pkill -x waybar; waybar -c ~/.config/sway/waybar/config.jsonc -s ~/.config/sway/waybar/style.css
exec dunst
exec ~/.config/sway/restore-wallpaper.sh

# Default background (overridden by restore-wallpaper.sh if a saved wallpaper exists)
output * bg /home/mnt/Downloads/5.png fill

#####################
### LOOK AND FEEL ###
#####################

font pango:JetBrainsMono Nerd Font 10

# No borders
default_border pixel 0
default_floating_border pixel 0

# Gaps (inner = gaps_in, outer = gaps_out)
gaps inner 5
gaps outer 10

# Window colors (focused / unfocused)
# class                 border     bg         text       indicator  child_border
client.focused          #33ccff    #33ccff    #ffffff    #33ccff    #33ccff
client.unfocused        #595959    #595959    #888888    #595959    #595959
client.focused_inactive #595959    #595959    #888888    #595959    #595959

#############################
### ENVIRONMENT VARIABLES ###
#############################

# Cursor theme (matches hyprland XCURSOR_THEME=Adwaita, XCURSOR_SIZE=24)
seat * xcursor_theme Adwaita 24

# HiDPI and theming env vars (matches hyprland GDK_SCALE=2, QT_QPA_PLATFORMTHEME=qt6ct)
exec dbus-update-activation-environment --systemd XCURSOR_THEME=Adwaita XCURSOR_SIZE=24 QT_QPA_PLATFORMTHEME=qt6ct

#############
### INPUT ###
#############

input "type:keyboard" {
    xkb_layout de
    xkb_options caps:escape
}

###################
### KEYBINDINGS ###
###################

# Screenshot a region and copy to clipboard via grim/slurp
bindsym Mod1+Shift+s exec grim -g "$(slurp -b 00000080)" - | wl-copy

# Cycle through wallpapers
bindsym Mod4+Mod1+space exec ~/.config/sway/cycle-wallpaper.sh

# Media Keys
bindsym XF86AudioRaiseVolume exec ~/.config/sway/volume-raise.sh
bindsym XF86AudioLowerVolume exec ~/.config/sway/volume-lower.sh
bindsym XF86AudioMute exec swayosd-client --output-volume mute-toggle
bindsym XF86AudioMicMute exec wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Playerctl
bindsym Ctrl+Mod1+Right exec playerctl next
bindsym Ctrl+Mod1+Left exec playerctl previous
bindsym Ctrl+Mod1+space exec playerctl play-pause
bindsym XF86AudioNext exec playerctl next
bindsym XF86AudioPause exec playerctl play-pause
bindsym XF86AudioPlay exec playerctl play-pause
bindsym XF86AudioPrev exec playerctl previous

# Core bindings
bindsym $mainMod+Return exec $terminal
bindsym $mainMod+q kill
bindsym Ctrl+Shift+Delete exit
bindsym $mainMod+e exec $fileManager
bindsym $mainMod+v floating toggle
bindsym $mainMod+space exec $menu
bindsym $mainMod+f fullscreen toggle

# Move focus with mainMod + hjkl
bindsym $mainMod+h focus left
bindsym $mainMod+l focus right
bindsym $mainMod+k focus up
bindsym $mainMod+j focus down

# Move/swap windows with mainMod + SHIFT + hjkl
bindsym $mainMod+Shift+h move left
bindsym $mainMod+Shift+l move right
bindsym $mainMod+Shift+k move up
bindsym $mainMod+Shift+j move down

# Switch workspaces
bindsym $mainMod+1 workspace 1
bindsym $mainMod+2 workspace 2
bindsym $mainMod+3 workspace 3
bindsym $mainMod+4 workspace 4
bindsym $mainMod+5 workspace 5
bindsym $mainMod+6 workspace 6
bindsym $mainMod+7 workspace 7
bindsym $mainMod+8 workspace 8
bindsym $mainMod+9 workspace 9
bindsym $mainMod+0 workspace 10

# Move active window to a workspace
bindsym $mainMod+Shift+1 move container to workspace 1
bindsym $mainMod+Shift+2 move container to workspace 2
bindsym $mainMod+Shift+3 move container to workspace 3
bindsym $mainMod+Shift+4 move container to workspace 4
bindsym $mainMod+Shift+5 move container to workspace 5
bindsym $mainMod+Shift+6 move container to workspace 6
bindsym $mainMod+Shift+7 move container to workspace 7
bindsym $mainMod+Shift+8 move container to workspace 8
bindsym $mainMod+Shift+9 move container to workspace 9
bindsym $mainMod+Shift+0 move container to workspace 10

# Scroll through workspaces with mainMod + scroll
bindsym $mainMod+button4 workspace prev
bindsym $mainMod+button5 workspace next

# Move/resize windows with mainMod + LMB/RMB and dragging
floating_modifier $mainMod normal

# Lock
bindsym Mod4+Shift+l exec ~/.config/sway/lock.sh

# Resize mode
mode "resize" {
    bindsym h resize shrink width 50px
    bindsym l resize grow width 50px
    bindsym k resize shrink height 50px
    bindsym j resize grow height 50px
    bindsym Escape mode "default"
    bindsym Return mode "default"
}
bindsym $mainMod+r exec notify-send "Resize mode" "h/l: width  j/k: height  Esc: exit", mode "resize"

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Assign apps to workspaces
assign [app_id="firefox"] workspace 1
assign [app_id="com.mitchellh.ghostty"] workspace 2
assign [app_id="calibre-ebook-viewer"] workspace 6
assign [app_id="discord"] workspace 8
assign [class="discord"] workspace 8
assign [app_id="spotify"] workspace 9
assign [class="steam"] workspace 10

# Launch apps at startup
exec firefox
exec ghostty
exec flatpak run com.spotify.Client
exec steam
exec discord --ozone-platform=wayland

######################
### LOOK MISC       ###
######################

# Disable focus-steal on activate
focus_on_window_activation none

# Dark theme
exec gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"

# Night light
exec wlsunset -l 51.51 -L 7.5 -t 6000
